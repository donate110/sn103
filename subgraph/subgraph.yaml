specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: SignalCommitment
    network: base-sepolia
    source:
      address: "0x184AFFF99BF4D742a1168281c029c06174477Bf7"
      abi: SignalCommitment
      startBlock: 38024000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Signal
        - Genius
        - ProtocolStats
      abis:
        - name: SignalCommitment
          file: ./abis/SignalCommitment.json
      eventHandlers:
        - event: SignalCommitted(indexed uint256,indexed
            address,string,uint256,uint256,uint256,uint256)
          handler: handleSignalCommitted
        - event: SignalCancelled(indexed uint256,indexed address)
          handler: handleSignalCancelled
        - event: SignalStatusUpdated(indexed uint256,uint8)
          handler: handleSignalStatusUpdated
      file: ./src/signal-commitment.ts
  - kind: ethereum
    name: Escrow
    network: base-sepolia
    source:
      address: "0x290E97c4B26ef1FdcF7BC27aFc43169B4a804a75"
      abi: Escrow
      startBlock: 38024000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Purchase
        - Idiot
        - Genius
        - Signal
        - ProtocolStats
      abis:
        - name: Escrow
          file: ./abis/Escrow.json
      eventHandlers:
        - event: Deposited(indexed address,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
        - event: SignalPurchased(indexed uint256,indexed
            address,uint256,uint256,uint256,uint256,uint256)
          handler: handleSignalPurchased
        - event: Refunded(indexed address,indexed address,uint256,uint256)
          handler: handleRefunded
        - event: OutcomeUpdated(indexed uint256,uint8)
          handler: handleOutcomeUpdated
        - event: FeesClaimed(indexed address,indexed address,uint256,uint256)
          handler: handleFeesClaimed
      file: ./src/escrow.ts
  - kind: ethereum
    name: Collateral
    network: base-sepolia
    source:
      address: "0x47bCAE6055dfF70137336211bE22f34C7a631626"
      abi: Collateral
      startBlock: 38024000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CollateralPosition
        - Genius
        - ProtocolStats
      abis:
        - name: Collateral
          file: ./abis/Collateral.json
      eventHandlers:
        - event: Deposited(indexed address,uint256)
          handler: handleCollateralDeposited
        - event: Withdrawn(indexed address,uint256)
          handler: handleCollateralWithdrawn
        - event: Locked(indexed uint256,indexed address,uint256)
          handler: handleCollateralLocked
        - event: Released(indexed uint256,indexed address,uint256)
          handler: handleCollateralReleased
        - event: Slashed(indexed address,uint256,indexed address)
          handler: handleCollateralSlashed
      file: ./src/collateral.ts
  - kind: ethereum
    name: Account
    network: base-sepolia
    source:
      address: "0x4f42F2c714adA4c55f2A967dDa6EFFA19E211deC"
      abi: Account
      startBlock: 38024000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Account
        - Genius
        - Idiot
      abis:
        - name: Account
          file: ./abis/Account.json
      eventHandlers:
        - event: PurchaseRecorded(indexed address,indexed address,uint256,uint256)
          handler: handlePurchaseRecorded
        - event: OutcomeRecorded(indexed address,indexed address,uint256,uint8)
          handler: handleOutcomeRecorded
        - event: NewCycleStarted(indexed address,indexed address,uint256)
          handler: handleNewCycleStarted
        - event: SettledChanged(indexed address,indexed address,bool)
          handler: handleSettledChanged
      file: ./src/account.ts
  - kind: ethereum
    name: Audit
    network: base-sepolia
    source:
      address: "0x95002b53F4f53A27a060502fE1f026F74e9110E9"
      abi: Audit
      startBlock: 38024000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AuditResult
        - Genius
        - Idiot
        - Account
        - ProtocolStats
      abis:
        - name: Audit
          file: ./abis/Audit.json
      eventHandlers:
        - event: AuditSettled(indexed address,indexed
            address,uint256,int256,uint256,uint256,uint256)
          handler: handleAuditSettled
        - event: EarlyExitSettled(indexed address,indexed address,uint256,int256,uint256)
          handler: handleEarlyExitSettled
      file: ./src/audit.ts
  - kind: ethereum
    name: CreditLedger
    network: base-sepolia
    source:
      address: "0xb2A4EaC9bAcA31264894Fb59a8A11C8CA1aa4eFE"
      abi: CreditLedger
      startBlock: 38024000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CreditBalance
        - Idiot
        - ProtocolStats
      abis:
        - name: CreditLedger
          file: ./abis/CreditLedger.json
      eventHandlers:
        - event: CreditsMinted(indexed address,uint256)
          handler: handleCreditsMinted
        - event: CreditsBurned(indexed address,uint256)
          handler: handleCreditsBurned
      file: ./src/credit-ledger.ts
  - kind: ethereum
    name: TrackRecord
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: TrackRecord
      startBlock: 38024000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TrackRecordProof
        - Genius
        - ProtocolStats
      abis:
        - name: TrackRecord
          file: ./abis/TrackRecord.json
      eventHandlers:
        - event: TrackRecordSubmitted(indexed uint256,indexed
            address,uint256,uint256,uint256,uint256,uint256,uint256,bytes32)
          handler: handleTrackRecordSubmitted
      file: ./src/track-record.ts
